<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Simulator | Tradeable vs Lossable</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 1100px; 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 20px; 
            flex: 1;
        }

        /* Sidebar Inputs */
        .panel { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
        .panel h2 { margin-top: 0; font-size: 1.2rem; color: var(--accent-blue); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; }
        .input-group input, .input-group select {
            width: 100%; background: #0f172a; border: 1px solid var(--border); border-radius: 6px;
            padding: 10px; color: white; font-size: 1rem; transition: border 0.2s;
        }
        .input-group input:focus { border-color: var(--accent-blue); outline: none; }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569; transition: .4s; border-radius: 20px;
        }
        .slider-toggle:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider-toggle { background-color: var(--accent-blue); }
        input:checked + .slider-toggle:before { transform: translateX(20px); }

        /* Dashboard */
        .dashboard { display: flex; flex-direction: column; gap: 20px; }
        
        .status-card {
            padding: 30px; border-radius: 12px; text-align: center;
            transition: all 0.3s ease; border: 2px solid transparent;
        }
        .safe { background: rgba(34, 197, 94, 0.1); border-color: var(--accent-green); }
        .danger { background: rgba(239, 68, 68, 0.1); border-color: var(--accent-red); }
        .warning { background: rgba(245, 158, 11, 0.1); border-color: var(--accent-orange); }

        .status-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .status-desc { font-size: 0.95rem; opacity: 0.9; }

        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .metric-box {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 20px; border-radius: 12px; position: relative; overflow: hidden;
        }
        .metric-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-size: 1.4rem; font-weight: 600; margin-top: 5px; }

        /* Slider Styles */
        .slider-container { margin: 20px 0; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent-blue); }

        /* Visual Gauge */
        .gauge-wrap { height: 8px; background: #334155; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        #margin-gauge-fill { height: 100%; width: 0%; transition: width 0.3s ease, background-color 0.3s; }

        .reason-box {
            margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 0.9rem;
            line-height: 1.4; border-left: 4px solid var(--accent-blue); background: #1a2233;
        }

        footer {
            margin-top: 40px; padding: 20px; color: var(--text-dim);
            font-size: 0.9rem; text-align: center; width: 100%;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <aside class="panel">
        <h2>Parameters</h2>
        
        <div class="input-group">
            <label>Trade Direction</label>
            <select id="direction">
                <option value="buy">BUY</option>
                <option value="sell">SELL</option>
            </select>
        </div>

        <div class="input-group">
            <label>Entry Price</label>
            <input type="number" id="entryPrice" value="5000" step="0.01">
        </div>

        <div class="input-group">
            <label>Predicted Price</label>
            <input type="number" id="predictedPrice" value="5500" step="0.01">
        </div>

        <div class="slider-container">
            <label style="font-size: 0.8rem; color: var(--text-dim);">Live Price Adjust</label>
            <input type="range" id="priceSlider" min="2500" max="7500" step="1">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>Lot Size</label>
                <input type="number" id="lotSize" value="1.0" step="0.01">
            </div>
            <div class="input-group">
                <label>Contract Size</label>
                <input type="number" id="contractSize" value="1000">
            </div>
        </div>

        <div class="input-group">
            <label>Leverage (1:X)</label>
            <input type="text" id="leverage" value="1:100">
        </div>

        <div class="input-group">
            <label>Account Balance ($)</label>
            <input type="number" id="balance" value="1000">
        </div>

        <div class="input-group">
            <label>Bonus System</label>
            <select id="bonusType">
                <option value="tradeable">Tradeable Bonus</option>
                <option value="lossable">Lossable Bonus</option>
            </select>
        </div>

        <div id="toggleWrapper" class="toggle-container">
            <label style="font-size: 0.75rem; color: var(--text-dim); font-weight: bold;">IGNORE BONUS IN EQUITY</label>
            <label class="switch">
                <input type="checkbox" id="strictMode">
                <span class="slider-toggle"></span>
            </label>
        </div>

        <div class="input-group">
            <label>Bonus Amount ($)</label>
            <input type="number" id="bonusAmount" value="500">
        </div>

        <div class="input-group">
            <label>Stop-Out Percentage (%)</label>
            <input type="number" id="stopOutLevel" value="50">
        </div>
    </aside>

    <main class="dashboard">
        <div id="statusCard" class="status-card safe">
            <div id="statusTitle" class="status-title">Trade Active</div>
            <div id="statusDesc" class="status-desc">Calculating simulation...</div>
        </div>

        <div id="metricsArea">
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-label">Used Margin</div>
                    <div id="outMargin" class="metric-value">$0.00</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Projected Equity</div>
                    <div id="outEquity" class="metric-value">$0.00</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Margin Level</div>
                    <div id="outMarginLevel" class="metric-value">0%</div>
                    <div class="gauge-wrap"><div id="margin-gauge-fill"></div></div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Distance to Stop-Out</div>
                    <div id="outDistance" class="metric-value">0.00</div>
                </div>
            </div>

            <div class="panel">
                <div class="metrics-grid">
                    <div>
                        <div class="metric-label">Stop-Out Price</div>
                        <div id="outStopPrice" class="metric-value" style="color: var(--accent-red);">0.00</div>
                    </div>
                    <div>
                        <div class="metric-label">Floating P/L</div>
                        <div id="outPL" class="metric-value">$0.00</div>
                    </div>
                </div>
                <div id="reasonText" class="reason-box"></div>
            </div>
        </div>
    </main>
</div>

<footer>
    copyright Amaanullah Bhatti - Junior Risk Analyst
</footer>

<script>
    const inputs = ['entryPrice', 'predictedPrice', 'direction', 'lotSize', 'balance', 'leverage', 'bonusType', 'bonusAmount', 'stopOutLevel', 'contractSize', 'strictMode'];
    const dom = {};
    inputs.forEach(id => dom[id] = document.getElementById(id));
    const slider = document.getElementById('priceSlider');

    function parseLeverage(val) { return parseFloat(val.toString().replace('1:', '')) || 1; }

    function update() {
        const entry = parseFloat(dom.entryPrice.value) || 0;
        const pred = parseFloat(dom.predictedPrice.value) || 0;
        const dir = dom.direction.value;
        const lot = parseFloat(dom.lotSize.value) || 0;
        const contract = parseFloat(dom.contractSize.value) || 0;
        const balance = parseFloat(dom.balance.value) || 0;
        const bonus = parseFloat(dom.bonusAmount.value) || 0;
        const leverage = parseLeverage(dom.leverage.value);
        const soPercent = parseFloat(dom.stopOutLevel.value) || 0;
        const type = dom.bonusType.value;
        const strict = dom.strictMode.checked && type === 'tradeable';

        // Toggle UI logic
        document.getElementById('toggleWrapper').style.opacity = (type === 'tradeable') ? "1" : "0.3";
        dom.strictMode.disabled = (type !== 'tradeable');

        // 1. Required Margin Check
        const margin = (lot * contract * entry) / leverage;
        const totalCapital = balance + bonus;
        
        const statusCard = document.getElementById('statusCard');
        if (margin > totalCapital) {
            statusCard.className = 'status-card warning';
            document.getElementById('statusTitle').innerText = "Cannot Enter Position";
            document.getElementById('statusDesc').innerText = `Margin required ($${margin.toFixed(2)}) exceeds Total Capital ($${totalCapital.toFixed(2)}).`;
            document.getElementById('metricsArea').style.opacity = "0.2";
            return;
        } else {
            document.getElementById('metricsArea').style.opacity = "1";
        }

        // 2. Main Calculations
        if (document.activeElement !== slider) {
            slider.min = entry * 0.5; slider.max = entry * 1.5; slider.value = pred;
        }

        const floatingPL = (dir === 'buy' ? (pred - entry) : (entry - pred)) * lot * contract;
        
        // Equity depends on strict toggle (only for tradeable)
        const equityAtPred = strict ? (balance + floatingPL) : (balance + bonus + floatingPL);
        const marginLevel = margin > 0 ? (equityAtPred / margin) * 100 : 0;

        // 3. Stop Out Price Calculation (Structural Issue 1)
        const multiplier = dir === 'buy' ? 1 : -1;
        
        // Threshold 1: Margin Level Percentage
        // (BaseEquity + PL) = Margin * (SO% / 100)
        const currentEquityBase = strict ? balance : (balance + bonus);
        const targetEquitySO = margin * (soPercent / 100);
        const priceSO = entry + ((targetEquitySO - currentEquityBase) / (lot * contract * multiplier));

        // Threshold 2: Floor logic
        // If Strict Tradeable: stops when balance hits 0
        // If Normal Tradeable: stops when equity hits bonus
        // If Lossable: no floor logic (Standard MT4/5)
        let priceFloor = dir === 'buy' ? -Infinity : Infinity;
        if (type === 'tradeable') {
            const floorLevel = strict ? 0 : bonus;
            priceFloor = entry + ((floorLevel - currentEquityBase) / (lot * contract * multiplier));
        }

        const stopPrice = dir === 'buy' ? Math.max(priceSO, priceFloor) : Math.min(priceSO, priceFloor);
        const isStopped = dir === 'buy' ? (pred <= stopPrice) : (pred >= stopPrice);

        // 4. UI Updates
        document.getElementById('outMargin').innerText = `$${margin.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('outEquity').innerText = `$${equityAtPred.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('outPL').innerText = `$${floatingPL.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('outMarginLevel').innerText = `${marginLevel.toFixed(2)}%`;
        document.getElementById('outStopPrice').innerText = stopPrice.toFixed(2);
        document.getElementById('outDistance').innerText = Math.abs(pred - stopPrice).toFixed(2);

        const gauge = document.getElementById('margin-gauge-fill');
        gauge.style.width = `${Math.min(marginLevel / 5, 100)}%`;
        gauge.style.backgroundColor = marginLevel <= soPercent ? 'var(--accent-red)' : 'var(--accent-blue)';

        if (isStopped) {
            statusCard.className = 'status-card danger';
            document.getElementById('statusTitle').innerText = "Trade WILL Hit Stop-Out";
            document.getElementById('statusDesc').innerText = `Price hits liquidation at ${stopPrice.toFixed(2)}.`;
            
            const hitFloor = (dir === 'buy' && stopPrice === priceFloor) || (dir === 'sell' && stopPrice === priceFloor);
            document.getElementById('reasonText').innerHTML = hitFloor 
                ? `<strong>Reason:</strong> ${strict ? 'Zero Balance' : 'Bonus Protection'} floor hit. Broker closed position to prevent credit loss.`
                : `<strong>Reason:</strong> Margin Level reached the ${soPercent}% liquidation threshold.`;
        } else {
            statusCard.className = 'status-card safe';
            document.getElementById('statusTitle').innerText = "Trade survives Prediction";
            document.getElementById('statusDesc').innerText = `Account remains active at simulated price ${pred.toFixed(2)}.`;
            document.getElementById('reasonText').innerText = `Equity is sufficient to sustain the ${type} system requirements.`;
        }
        document.getElementById('outPL').style.color = floatingPL >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
    }

    inputs.forEach(id => dom[id].addEventListener('input', update));
    slider.addEventListener('input', (e) => { dom.predictedPrice.value = e.target.value; update(); });
    update();
</script>
</body>
</html>
